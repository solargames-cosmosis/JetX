<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JetX Chat</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
}

.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 15px;
}

.logo {
  font-size: 34px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.controls button {
  margin-left: 10px;
  padding: 6px 10px;
  border: none;
  background: #6d28d9;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.chat {
  margin-top: 70px;
  height: calc(100vh - 150px);
  overflow-y: auto;
  padding: 10px;
}

.msg {
  background: #222;
  padding: 8px;
  margin: 6px 0;
  border-radius: 8px;
}

.name {
  font-weight: bold;
  color: #6d28d9;
  font-size: 12px;
}

.inputBox {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 10px;
}

input {
  width: 100%;
  margin-bottom: 6px;
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: #141424;
  color: white;
}

.row {
  display: flex;
  gap: 10px;
}

button {
  padding: 10px;
  background: #6d28d9;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo" onclick="goHome()">JetX Chat</div>
  <div class="controls">
    <button onclick="goHome()">Home</button>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="inputBox">
  <input id="nameInput" placeholder="Enter your name..." />
  <div class="row">
    <input id="msgInput" placeholder="Type a message..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

const chat = document.getElementById("chat");
const msgInput = document.getElementById("msgInput");
const nameInput = document.getElementById("nameInput");

/* LOAD NAME */
nameInput.value = localStorage.getItem("jetx_name") || "";

/* SAVE NAME */
nameInput.addEventListener("change", () => {
  localStorage.setItem("jetx_name", nameInput.value);
});

/* SEND */
async function send(){
  const text = msgInput.value.trim();
  const name = nameInput.value.trim();

  if(!text || !name) {
    alert("Enter a name and message");
    return;
  }

  await fetch("/api/chatroom", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ text, name })
  });

  msgInput.value = "";
  load();
}

/* LOAD */
async function load(){
  const res = await fetch("/api/chatroom");
  const data = await res.json();

  chat.innerHTML = "";

  data.messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <div class="name">${m.name}</div>
      <div>${m.text}</div>
    `;

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

/* AUTO REFRESH */
setInterval(load, 2000);
load();

/* ENTER KEY */
msgInput.addEventListener("keydown", e => {
  if(e.key === "Enter") send();
});

/* HOME */
function goHome(){
  window.location.href = "/";
}

</script>

</body>
</html>
