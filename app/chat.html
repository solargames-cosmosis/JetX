<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JetX Chat</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
}

.header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 60px;
  background: #111;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 15px;
}

.logo {
  font-size: 30px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.chat {
  margin-top: 70px;
  height: calc(100vh - 160px);
  overflow-y: auto;
  padding: 10px;
}

.msg {
  background: #222;
  padding: 8px;
  margin: 6px 0;
  border-radius: 8px;
}

.name {
  color: #6d28d9;
  font-weight: bold;
  font-size: 12px;
}

.time {
  font-size: 10px;
  opacity: 0.6;
}

.users {
  position: fixed;
  right: 0;
  top: 60px;
  width: 120px;
  background: #111;
  height: 100%;
  padding: 10px;
  font-size: 12px;
}

.inputBox {
  position: fixed;
  bottom: 0;
  width: calc(100% - 140px);
  padding: 10px;
  background: #111;
}

.row {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #141424;
  color: white;
}

button {
  padding: 10px;
  background: #6d28d9;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo" onclick="goHome()">JetX Chat</div>
  <button onclick="clearChat()">Clear</button>
</div>

<div class="chat" id="chat"></div>
<div class="users" id="users"></div>

<div class="inputBox">
  <div id="typing" style="font-size:12px; opacity:0.6;"></div>
  <div class="row">
    <input id="msg" placeholder="Type message..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

const chat = document.getElementById("chat");
const usersBox = document.getElementById("users");
const input = document.getElementById("msg");
const typing = document.getElementById("typing");

// LOCK NAME
let name = localStorage.getItem("jetx_name");
if (!name) {
  name = prompt("Enter your name:");
  localStorage.setItem("jetx_name", name);
}

// SEND
async function send(){
  const text = input.value.trim();
  if(!text) return;

  await fetch("/api/chatroom", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ text, name })
  });

  input.value = "";
}

// LOAD
async function load(){
  const res = await fetch("/api/chatroom");
  const data = await res.json();

  chat.innerHTML = "";

  data.messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <div class="name">${m.name}</div>
      <div>${m.text}</div>
      <div class="time">${new Date(m.time).toLocaleTimeString()}</div>
    `;

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

// USERS
async function updateUsers(){
  const res = await fetch("/api/chatroom", {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ name })
  });

  const data = await res.json();

  usersBox.innerHTML = "<b>Online</b><br>" + data.users.join("<br>");
}

// ADMIN CLEAR
async function clearChat(){
  await fetch("/api/chatroom", { method: "DELETE" });
  load();
}

// TYPING
input.addEventListener("input", () => {
  typing.textContent = name + " is typing...";
  setTimeout(() => typing.textContent = "", 1000);
});

// LOOP
setInterval(() => {
  load();
  updateUsers();
}, 1000);

load();

// HOME
function goHome(){
  window.location.href = "/";
}

</script>

</body>
</html>
