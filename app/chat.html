<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JetX Chat</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 15px;
}

.logo {
  font-size: 34px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.controls button {
  margin-left: 10px;
  padding: 6px 10px;
  border: none;
  background: #6d28d9;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* CHAT */
.chat {
  margin-top: 70px;
  height: calc(100vh - 130px);
  overflow-y: auto;
  padding: 10px;
}

.msg {
  background: #222;
  padding: 8px;
  margin: 6px 0;
  border-radius: 8px;
  word-wrap: break-word;
}

/* INPUT */
.input {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  gap: 10px;
  padding: 10px;
  background: #111;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #141424;
  color: white;
}

button {
  padding: 10px;
  background: #6d28d9;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo" onclick="goHome()">JetX Chat</div>
  <div class="controls">
    <button onclick="goHome()">Home</button>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="input">
  <input id="msgInput" placeholder="Type a message..." />
  <button onclick="send()">Send</button>
</div>

<script>

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");

/* SEND MESSAGE */
async function send(){
  const text = input.value.trim();
  if(!text) return;

  await fetch("/api/chatroom", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  input.value = "";
  load();
}

/* LOAD MESSAGES */
async function load(){
  const res = await fetch("/api/chatroom");
  const data = await res.json();

  chat.innerHTML = "";

  data.messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg";
    div.textContent = m.text;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

/* AUTO REFRESH */
setInterval(load, 2000);
load();

/* ENTER KEY */
input.addEventListener("keydown", e => {
  if(e.key === "Enter") send();
});

/* HOME FIX */
function goHome(){
  window.location.href = "/";
}

</script>

</body>
</html>
