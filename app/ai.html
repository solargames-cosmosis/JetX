<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JetX AI</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial;
  color: white;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 15px;
}

.logo {
  font-size: 34px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.controls button {
  margin-left: 10px;
  padding: 6px 10px;
  border: none;
  background: #6d28d9;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* CHAT BOX */
.chat {
  margin-top: 80px;
  width: 90%;
  max-width: 800px;
  height: 70vh;
  margin-left: auto;
  margin-right: auto;
  background: #141424;
  border-radius: 12px;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
}

.user {
  background: #6d28d9;
  text-align: right;
}

.ai {
  background: #222;
}

/* INPUT */
.input {
  display: flex;
  gap: 10px;
  width: 90%;
  max-width: 800px;
  margin: 10px auto;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #141424;
  color: white;
}

button {
  padding: 12px;
  background: #6d28d9;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo" onclick="goHome()">JetX AI</div>
  <div class="controls">
    <button onclick="clearChat()">Clear</button>
    <button onclick="goHome()">Home</button>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="input">
  <input id="input" placeholder="Ask JetX AI..." />
  <button onclick="send()">Send</button>
</div>

<script>

const chat = document.getElementById("chat");
const input = document.getElementById("input");

input.addEventListener("keydown", e => {
  if(e.key === "Enter") send();
});

function add(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send(){

  const text = input.value.trim();
  if(!text) return;

  add(text, "user");
  input.value = "";

  add("Thinking...", "ai");

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  chat.lastChild.textContent = data.reply || "No response";
}

function clearChat(){
  chat.innerHTML = "";
}

function goHome(){
  window.location.href = "https://jet-x-silk.vercel.app";
}

</script>

</body>
</html>
