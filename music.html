<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>JetX: Educational Audios</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
  :root {
    --bg: #0b0b0b;
    --card: rgba(20,20,20,0.85);
    --accent: #ff2a2a;
    --text: #fff;
    --sub: #aaa;
  }

  body {
    margin: 0;
    font-family: sans-serif;
    background: radial-gradient(circle at top, #1a0000, #000);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* JetX Header */
  .header {
    height: 55px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .header .logo {
    font-weight: bold;
    color: var(--accent);
  }

  .header i {
    font-size: 22px;
    cursor: pointer;
  }

  /* Main wrapper */
  #wrapper {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Left (now playing) */
  .left {
    width: 40%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
    background: rgba(0,0,0,0.3);
  }

  #coverArt {
    width: 220px;
    height: 220px;
    border-radius: 20px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #coverArt img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #songTitle {
    font-size: 18px;
    font-weight: bold;
  }

  #songArtist {
    font-size: 14px;
    color: var(--sub);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 15px;
    align-items: center;
  }

  .controls i {
    font-size: 28px;
    cursor: pointer;
  }

  #playPauseButton i {
    font-size: 40px;
    color: var(--accent);
  }

  /* Right side */
  #rightBox {
    flex: 1;
    background: var(--card);
    backdrop-filter: blur(15px);
    display: flex;
    flex-direction: column;
  }

  #searchInput {
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #111;
    color: white;
  }

  #searchResults {
    flex: 1;
    overflow-y: auto;
  }

  .result-item {
    display: flex;
    gap: 10px;
    padding: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
  }

  .result-item:hover {
    background: rgba(255,255,255,0.05);
  }

  .result-art {
    width: 50px;
    height: 50px;
    background: #222;
    border-radius: 8px;
    overflow: hidden;
  }

  .result-text {
    flex: 1;
  }

  .result-title {
    font-size: 14px;
  }

  .result-artist {
    font-size: 12px;
    color: var(--sub);
  }

  /* Progress */
  #progressBar {
    width: 90%;
    margin-top: 10px;
  }

</style>
</head>

<body>

<!-- JetX Header -->
<div class="header">
  <div class="logo">JetX Music</div>
  <div>
    <i class="ri-home-line"></i>
    <i class="ri-fullscreen-line"></i>
  </div>
</div>

<div id="wrapper">

  <!-- LEFT -->
  <div class="left">
    <div id="coverArt">
      <i id="musicIcon" class="ri-music-2-fill"></i>
    </div>

    <div id="songTitle">Nothing Playing</div>
    <div id="songArtist">Select a track</div>

    <input type="range" id="progressBar" value="0" max="100">

    <div class="controls">
      <i id="prevButton" class="ri-skip-back-fill"></i>
      <button id="playPauseButton"><i class="ri-play-circle-fill"></i></button>
      <i id="nextButton" class="ri-skip-forward-fill"></i>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="rightBox">
    <input id="searchInput" placeholder="Search music..." />
    <div id="searchResults"></div>
    <div id="loadingMore"></div>
  </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
