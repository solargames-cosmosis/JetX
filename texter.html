<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zaapiz Game Corner Games</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        :root {
            --bg: #000000;
            --accent: #ff7ab8;
            --accent-glow: rgba(110, 203, 255, 0.3);
            --text-dim: #94a3b8;
            --border: rgba(110, 203, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.03);
            --input-bg: rgba(255, 255, 255, 0.05);
            --font: 'Brush Script MT', 'Brush Script', cursive;
            --transition-fast: 0.2s ease;
            --transition-slow: 0.4s ease-in;
            --fav-color: #ff4b2b;
            /* cotton candy gradient for outlines */
            --cotton-one: #6699ff;
            --cotton-two: #ff7ab8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: white;
            padding: 20px;
            overflow-x: hidden;
            animation: fadeIn var(--transition-slow);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Search */
        .search-container {
            width: 100%;
            max-width: 1000px;
            margin-top: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .search-input-wrapper {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            color: var(--accent);
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            background: var(--input-bg);
            border: 2px solid var(--border);
            padding: 14px 20px 14px 45px;
            color: white;
            border-radius: 12px;
            font-family: var(--font);
            outline: none;
            font-size: 1rem;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }
        #searchInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            background: rgba(255, 255, 255, 0.05);
        }

        #sortSelect {
            width: auto;
            flex-shrink: 0;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 14px 12px;
            border-radius: 12px;
            font-family: var(--font);
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            color-scheme: dark;
        }

        .fav-filter-btn {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font);
            transition: all var(--transition-fast);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .fav-filter-btn.active {
            border-color: var(--fav-color);
            color: var(--fav-color);
            background: rgba(255, 75, 43, 0.05);
        }

        /* Zaapiz carousel */
        .zaapiz-wrapper {
            width: 100%;
            max-width: 1200px;
            position: relative;
            margin-bottom: 40px;
            padding: 0 60px;
            box-sizing: border-box;
            z-index: 1;
        }
        .zaapiz-header {
            text-align: left;
            margin-bottom: 15px;
            background-image: linear-gradient(90deg, var(--cotton-one), var(--cotton-two));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 6s linear infinite;
            font-size: 1rem;
            letter-spacing: 3px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .zaapiz-viewport {
            overflow: hidden;
            border-radius: 20px;
            background: rgba(110, 203, 255, 0.02);
            border: 1px solid var(--border);
            padding: 20px 0;
        }
        #zaapizFavsContainer {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .zaapiz-item {
            flex: 0 0 calc(20% - 30px);
            margin: 0 15px;
            text-align: center;
            cursor: pointer;
            transition: transform var(--transition-fast);
        }
        .zaapiz-item:hover { transform: scale(1.03); }
        .zaapiz-item img {
            width: 100%;
            aspect-ratio: 2/3;
            border-radius: 15px;
            object-fit: cover;
            border: 4px solid transparent;
            border-image-source: linear-gradient(90deg, var(--cotton-one), var(--cotton-two));
            border-image-slice: 1;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast);
        }
        .zaapiz-item:hover img {
            box-shadow: 0 0 24px rgba(102,153,255,0.25), 0 0 36px rgba(255,122,184,0.2);
        }
        .zaapiz-nav {
            position: absolute;
            top: 55%;
            transform: translateY(-50%);
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-fast);
        }
        .zaapiz-nav:hover {
            background: var(--input-bg);
            border-color: var(--accent);
        }
        .zaapiz-prev { left: 5px; }
        .zaapiz-next { right: 5px; }

        /* Main Grid */
        #container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            animation: fadeIn var(--transition-slow);
            justify-content: center;
            z-index: 1;
        }
        .zone-item {
            background: var(--card-bg);
            border: 4px solid transparent;
            border-image-source: linear-gradient(90deg, var(--cotton-one), var(--cotton-two));
            border-image-slice: 1;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            position: relative;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform var(--transition-fast), border var(--transition-fast), box-shadow var(--transition-fast);
        }
        .zone-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 0 20px rgba(102,153,255,0.18), 0 0 40px rgba(255,122,184,0.16);
        }
        .zone-item img {
            width: 100%;
            border-radius: 8px;
            aspect-ratio: 1;
            object-fit: cover;
            border: 4px solid transparent;
            border-image-source: linear-gradient(90deg, var(--cotton-one), var(--cotton-two));
            border-image-slice: 1;
        }
        .heart-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
            transition: color var(--transition-fast);
            z-index: 5;
        }
        .heart-btn.active { color: var(--fav-color); }
        .zone-item p {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--text-dim);
            transition: color var(--transition-fast);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .zone-item:hover p {
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent-glow);
        }

        /* Zone Viewer Overlay */
        #zoneViewer {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            flex-direction: column;
            z-index: 1000;
            animation: fadeIn var(--transition-slow);
        }
        .zone-header {
            padding: 15px;
            background: var(--bg);
            border-bottom: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #zoneName {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .controls { display: flex; gap: 10px; }
        .control-btn {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            font-family: var(--font);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .control-btn:hover {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 12px var(--accent-glow);
        }
        #zoneFrame {
            flex-grow: 1;
            border: none;
            width: calc(100% - 24px);
            height: calc(100% - 24px);
            margin: 0 12px 12px 12px;
            background: transparent;
            border-radius: 12px;
            display: block;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--input-bg); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        @media (max-width: 800px) {
            .zaapiz-item { flex: 0 0 calc(50% - 20px); }
            .zaapiz-wrapper { padding: 0 40px; }
            .search-container { flex-direction: column; align-items: stretch; }
        }

        /* Liveliness: animated background blobs and pop-in animations */
        body::before {
            content: '';
            position: fixed;
            inset: -20%;
            background:
                radial-gradient(600px 400px at 10% 20%, rgba(102,153,255,0.12), transparent 20%),
                radial-gradient(500px 300px at 80% 70%, rgba(255,122,184,0.10), transparent 20%),
                radial-gradient(400px 250px at 50% 50%, rgba(110,203,255,0.06), transparent 20%);
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
            animation: floatBubbles 14s linear infinite;
            mix-blend-mode: screen;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(120deg, rgba(255,255,255,0.015), rgba(255,255,255,0) 30%);
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: overlay;
            opacity: 0.9;
        }
        @keyframes floatBubbles {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-18px) rotate(3deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        .pop-in { opacity: 0; transform: translateY(12px) scale(0.98); animation: popIn 420ms cubic-bezier(.2, .8, .2, 1) forwards; }
        @keyframes popIn { to { opacity: 1; transform: translateY(0) scale(1); } }

        .zaapiz-nav { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .zaapiz-nav:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 6px 20px rgba(0,0,0,0.45); }

        .heart-btn:hover { transform: scale(1.08); }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <div class="zaapiz-wrapper" id="zaapizFavsWrapper" style="display:none;">
        <div class="zaapiz-header">Zaapiz's Favs</div>
        <button class="zaapiz-nav zaapiz-prev" onclick="zManualNav(-1)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="zaapiz-viewport">
            <div id="zaapizFavsContainer"></div>
        </div>
        <button class="zaapiz-nav zaapiz-next" onclick="zManualNav(1)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>

    <div class="search-container">
        <div class="search-input-wrapper">
            <span class="search-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="text" id="searchInput" placeholder="Search for a game..." oninput="handleSearch()">
        </div>
        <select id="sortSelect" onchange="handleSearch()">
            <option value="popular">Popular</option>
            <option value="name">Name</option>
            <option value="id">Date (ID)</option>
        </select>
        <button id="favFilter" class="fav-filter-btn" onclick="toggleFavFilter()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0;"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg> Favorites
        </button>
    </div>

    <div id="container">Loading zones...</div>

    <div id="zoneViewer">
        <div class="zone-header">
            <div>
                <strong id="zoneName">Game</strong>
            </div>
            <div class="controls">
                <button class="control-btn" onclick="fullscreenZone()">Fullscreen</button>
                <button class="control-btn" onclick="downloadZone()">Download</button>
                <button class="control-btn" onclick="closeZone()">Close</button>
            </div>
        </div>
        <iframe id="zoneFrame"></iframe>
    </div>

    <script>
        function cleanHTML(html) {
            html = html.replace(/#sidebarad1\s*,\s*\n?#sidebarad2[\s\S]*?\.sidebar-frame\s*\{[\s\S]*?\}/g, '');
            html = html.replace(/<div\s+id=["']sidebarad[12]["'][^>]*>[\s\S]*?<\/div>\s*(<\/div>)?/g, '');
            html = html.replace(/<script>\s*\(function\(_0x[a-f0-9]+[\s\S]*?duplace\.ne[\s\S]*?<\/script>/g, '');
            html = html.replace(/<style>[^<]*#sidebarad[\s\S]*?<\/style>/g, '');
            return html;
        }

        const container = document.getElementById('container');
        const zoneViewer = document.getElementById('zoneViewer');
        let zoneFrame = document.getElementById('zoneFrame');
        /* Featured carousel removed */
        let popularityData = {};

        const zonesurls = [
            "https://cdn.jsdelivr.net/gh/freebuisness/assets@latest/zones.json",
            "https://cdn.jsdelivr.net/gh/freebuisness/assets@latest/zones.json",
        ];
        let zonesURL = zonesurls[Math.floor(Math.random() * zonesurls.length)];
        const coverURL = "https://cdn.jsdelivr.net/gh/freebuisness/covers@main";
        const htmlURL = "https://cdn.jsdelivr.net/gh/freebuisness/html@main";

        // Inline SVG placeholder for missing covers
        const PLACEHOLDER_DATA = 'data:image/svg+xml;utf8,' + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" width="480" height="720" viewBox="0 0 480 720">'
            + '<rect width="100%" height="100%" fill="#071029"/>'
            + '<text x="50%" y="50%" fill="#94a3b8" font-size="20" text-anchor="middle" dominant-baseline="middle" font-family="Arial, Helvetica, sans-serif">No cover</text>'
            + '</svg>'
        );

        function computeCoverSrc(file) {
            if (!file) return PLACEHOLDER_DATA;
            let src = file.cover || '';
            try {
                if (!src) {
                    return `${coverURL}/${file.id}.png`;
                }
                // replace known placeholders
                src = src.replace(/\{COVER_URL\}/g, coverURL).replace(/\{HTML_URL\}/g, htmlURL);
                // protocol-relative -> force https
                if (src.startsWith('//')) src = 'https:' + src;
                // relative paths -> prefix with coverURL
                if (!/^https?:\/\//i.test(src)) {
                    src = `${coverURL}/${src.replace(/^\/+/, '')}`;
                }
                return src;
            } catch (e) {
                return PLACEHOLDER_DATA;
            }
        }

        let zones = [];
        let favorites = JSON.parse(localStorage.getItem('gn-favs') || '[]');
        let showFavsOnly = false;

        async function listZones() {
            try {
                let sharesponse;
                try {
                    sharesponse = await fetch("https://api.github.com/repos/freebuisness/assets/commits?t="+Date.now()); 
                } catch (error) {}
                if (sharesponse && sharesponse.status === 200) {
                    try {
                        let shajson = await sharesponse.json();
                        let sha = shajson[0]['sha'];
                        if (sha) zonesURL = `https://cdn.jsdelivr.net/gh/freebuisness/assets@${sha}/zones.json`;
                    } catch (error) {}
                }
                const response = await fetch(zonesURL + "?t=" + Date.now());
                zones = await response.json();
                await fetchPopularity();
                // build Zaapiz favs carousel and grid
                zSetupFavs();
                handleSearch();
            } catch (error) {
                container.innerHTML = "Error: " + error;
            }
        }

        /* Featured carousel removed - developer pin UI removed */

        async function fetchPopularity() {
            try {
                const response = await fetch("https://data.jsdelivr.com/v1/stats/packages/gh/gn-math/html@main/files?period=year");
                const data = await response.json();
                data.forEach(file => {
                    const idMatch = file.name.match(/\/(\d+)\.html$/);
                    if (idMatch) {
                        const id = parseInt(idMatch[1]);
                        popularityData[id] = file.hits.total;
                    }
                });
            } catch (error) {
                popularityData[0] = 0;
            }
        }

        /* Zaapiz carousel JS (distinct names to avoid interference) */
        // Dev-pinned IDs: edit this array to pin game IDs at the top of Zaapiz's Favs.
        // Example: const DEV_PINNED_IDS = [123,456];
        const DEV_PINNED_IDS = [1,182,117,11,710,751,103,82]; // <-- put numeric game IDs here

        function getDevPinnedIds() {
            try {
                if (Array.isArray(DEV_PINNED_IDS) && DEV_PINNED_IDS.length) return DEV_PINNED_IDS.slice();
                const raw = localStorage.getItem('zaapiz_favs') || '';
                return raw.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
            } catch (e) { return []; }
        }

        let zaapizFavs = [];
        let zCarouselIndex = 0;
        let zCarouselTimer;
        let zPauseTimer;
        let zIsTransitioning = false;

        function zSetupFavs() {
            if (!Array.isArray(zones) || zones.length === 0) return;
            const pool = [...zones].filter(z => !z.name.includes("SUGGEST"));
            const pinnedIds = typeof getDevPinnedIds === 'function' ? getDevPinnedIds() : [];
            if (Array.isArray(pinnedIds) && pinnedIds.length) {
                const pinned = pinnedIds.map(id => pool.find(z => z.id == id)).filter(Boolean);
                if (pinned.length) {
                    zaapizFavs = pinned;
                    zRenderFavs();
                    document.getElementById('zaapizFavsWrapper').style.display = 'block';
                    return;
                }
            }
            // fallback: pick top N by popularity
            pool.sort((a, b) => (popularityData[b.id] || 0) - (popularityData[a.id] || 0));
            zaapizFavs = pool.slice(0, 10);
            zRenderFavs();
            document.getElementById('zaapizFavsWrapper').style.display = zaapizFavs.length ? 'block' : 'none';
        }

        function zRenderFavs() {
            const container = document.getElementById('zaapizFavsContainer');
            if (!container) return;
            container.innerHTML = '';
            const itemsVisible = window.innerWidth > 800 ? 5 : 2;
            const clonesBefore = zaapizFavs.slice(-itemsVisible);
            const clonesAfter = zaapizFavs.slice(0, itemsVisible);
            const displayPool = [...clonesBefore, ...zaapizFavs, ...clonesAfter];
            displayPool.forEach((file) => {
                try {
                    const div = document.createElement('div');
                    div.className = 'zaapiz-item';
                    div.onclick = () => openZone(file);
                    const img = document.createElement('img');
                    img.alt = (file && file.name) ? file.name : 'cover';
                    img.src = computeCoverSrc(file);
                    img.onerror = function () { this.onerror = null; this.src = PLACEHOLDER_DATA; };
                    const p = document.createElement('p');
                    p.textContent = file ? file.name : '';
                    p.style.fontSize = '0.75rem';
                    p.style.marginTop = '8px';
                    p.style.fontWeight = 'bold';
                    div.append(img, p);
                    container.appendChild(div);
                } catch (e) {
                    console.error('Error rendering zaapiz item', e, file);
                }
            });
            // staggered pop-in animation for carousel items
            setTimeout(() => {
                try {
                    const zaItems = container.querySelectorAll('.zaapiz-item');
                    zaItems.forEach((el, i) => {
                        el.classList.add('pop-in');
                        el.style.animationDelay = (i * 80) + 'ms';
                    });
                } catch (e) { /* ignore */ }
            }, 30);
            zCarouselIndex = itemsVisible;
            zUpdateCarouselPosition(false);
            zStartCarousel();
        }

        function zUpdateCarouselPosition(transition = true) {
            const itemsVisible = window.innerWidth > 800 ? 5 : 2;
            const offset = zCarouselIndex * (100 / itemsVisible);
            const container = document.getElementById('zaapizFavsContainer');
            if (!container) return;
            container.style.transition = transition ? 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)' : 'none';
            container.style.transform = `translateX(-${offset}%)`;
        }

        function zStartCarousel() {
            clearInterval(zCarouselTimer);
            zCarouselTimer = setInterval(() => zMoveCarousel(1), 4000);
        }

        function zMoveCarousel(direction) {
            if (zIsTransitioning) return;
            const itemsVisible = window.innerWidth > 800 ? 5 : 2;
            const totalItems = zaapizFavs.length;
            if (!totalItems) return;
            zIsTransitioning = true;
            zCarouselIndex += direction;
            zUpdateCarouselPosition(true);
            setTimeout(() => {
                if (zCarouselIndex >= totalItems + itemsVisible) {
                    zCarouselIndex = itemsVisible;
                    zUpdateCarouselPosition(false);
                } else if (zCarouselIndex <= 0) {
                    zCarouselIndex = totalItems;
                    zUpdateCarouselPosition(false);
                }
                zIsTransitioning = false;
            }, 600);
        }

        function zManualNav(dir) {
            zMoveCarousel(dir);
            clearInterval(zCarouselTimer);
            clearTimeout(zPauseTimer);
            zPauseTimer = setTimeout(zStartCarousel, 4000);
        }

        window.addEventListener('resize', () => {
            if (zaapizFavs.length > 0) zRenderFavs();
        });

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const sortBy = document.getElementById('sortSelect').value;
            let filtered = zones.filter(z => {
                const matchesSearch = z.name.toLowerCase().includes(query);
                const matchesFav = showFavsOnly ? favorites.includes(z.id) : true;
                return matchesSearch && matchesFav;
            });
            if (sortBy === 'name') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortBy === 'id') {
                filtered.sort((a, b) => b.id - a.id);
            } else {
                filtered.sort((a, b) => (popularityData[b.id] || 0) - (popularityData[a.id] || 0));
            }
            renderGrid(filtered);
        }

        function toggleFavFilter() {
            showFavsOnly = !showFavsOnly;
            document.getElementById('favFilter').classList.toggle('active', showFavsOnly);
            handleSearch();
        }

        function toggleHeart(e, id) {
            e.stopPropagation();
            if (favorites.includes(id)) {
                favorites = favorites.filter(f => f !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('gn-favs', JSON.stringify(favorites));
            handleSearch();
        }

        function renderGrid(data) {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const displayData = data.filter(z => {
                const matchesSearch = z.name.toLowerCase().includes(query);
                const matchesFav = showFavsOnly ? favorites.includes(z.id) : true;
                return matchesSearch && matchesFav;
            });
            container.innerHTML = "";
            displayData.forEach(file => {
                const div = document.createElement('div');
                div.className = 'zone-item';
                div.onclick = () => openZone(file);
                const heart = document.createElement('button');
                heart.className = `heart-btn ${favorites.includes(file.id) ? 'active' : ''}`;
                heart.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
                heart.onclick = (e) => toggleHeart(e, file.id);
                const img = document.createElement('img');
                img.alt = (file && file.name) ? file.name : 'cover';
                img.src = computeCoverSrc(file);
                img.onerror = function () { this.onerror = null; this.src = PLACEHOLDER_DATA; };
                const p = document.createElement('p');
                p.textContent = file.name;
                div.append(heart, img, p);
                container.appendChild(div);
            });
            // staggered pop-in animation for grid items
            setTimeout(() => {
                try {
                    const gridItems = container.querySelectorAll('.zone-item');
                    gridItems.forEach((el, i) => {
                        el.classList.add('pop-in');
                        el.style.animationDelay = (i * 45) + 'ms';
                    });
                } catch (e) { /* ignore */ }
            }, 20);
        }

        function openZone(file) {
            if (!file) return;
            if (file.name === "[!] SUGGEST GAMES .gg/D4c9VFYWyU") {
                window.open("https://discord.com/invite/dKs2sUNUXd", "_blank");
                return;
            }
            const fileUrl = (file.url || '').toString();
            if (fileUrl.startsWith("http")) {
                window.open(fileUrl, "_blank");
                return;
            }
            if (!fileUrl) {
                alert('This game has no URL available.');
                return;
            }
            const url = fileUrl.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
            fetch(url + "?t=" + Date.now()).then(response => response.text()).then(html => {
                html = cleanHTML(html);
                if (!zoneFrame || zoneFrame.contentDocument === null) {
                    zoneFrame = document.createElement("iframe");
                    zoneFrame.id = "zoneFrame";
                    zoneViewer.appendChild(zoneFrame);
                }
                zoneFrame.contentDocument.open();
                zoneFrame.contentDocument.write(html);
                zoneFrame.contentDocument.close();
                document.getElementById('zoneName').textContent = file.name;
                zoneViewer.dataset.zoneId = file.id;
                zoneViewer.style.display = "flex";
                zoneViewer.hidden = false;
            }).catch(error => alert("Failed to load zone: " + error));
        }

        function closeZone() {
            zoneViewer.hidden = true;
            zoneViewer.style.display = "none";
            if (zoneFrame && zoneFrame.parentNode) {
                zoneViewer.removeChild(zoneFrame);
            }
            const url = new URL(window.location);
            url.searchParams.delete('id');
            history.pushState(null, '', url.toString());
        }

        function downloadZone() {
            let zone = zones.find(zone => (zone.id + '') === (zoneViewer.dataset.zoneId || ''));
            if (!zone) { alert('No zone loaded to download'); return; }
            const url = (zone.url || '').replace("{HTML_URL}", htmlURL);
            fetch(url + "?t=" + Date.now()).then(res => res.text()).then(text => {
                text = cleanHTML(text);
                const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
                const urlObj = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = urlObj;
                a.download = zone.name + ".html";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(urlObj);
            }).catch(e => alert('Failed to download: ' + e));
        }

        function fullscreenZone() {
            if (zoneFrame.requestFullscreen) {
                zoneFrame.requestFullscreen();
            } else if (zoneFrame.webkitRequestFullscreen) {
                zoneFrame.webkitRequestFullscreen();
            }
        }

        function openCloudmoon() {
            const relativePath = 'index-2604131056.html';
            try {
                window.open(encodeURI(relativePath), '_blank');
            } catch (e) {
                // fallback to navigation if popup blocked
                window.location.href = encodeURI(relativePath);
            }
        }

        // featured carousel removed; no resize handler needed

        // Featured carousel removed; just load zones
        listZones();
    </script>
</body>
