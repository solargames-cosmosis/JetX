<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="/style/all.css" rel="stylesheet" />
    <script src="/script/theme.js"></script>
    <script src="/script/tooltip.js"></script>
    <script src="/script/background.js"></script>

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-PPE9RTDYDG"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-PPE9RTDYDG");
    </script>

    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="browser-view">
      <div class="backdrop" id="backdrop"></div>

      <div class="top-bar-container">
        <div class="top-bar-content">
          <div class="dropdown-wrapper" id="source-dropdown-wrapper">
            <div class="dropdown-menu">
              <i class="ri-film-line" id="current-source-icon"></i>
              <span class="dropdown-text">Movies</span>
              <i class="ri-arrow-down-s-line"></i>
            </div>
            <div class="dropdown-options" id="source-options-container">
              <div class="option" data-value="movie">
                <i class="ri-film-line"></i> Movies
              </div>
              <div class="option disabled" data-value="tv" title="Coming Soon">
                <i class="ri-tv-2-line"></i> TV Shows
              </div>
              <div class="option" data-value="youtube">
                <i class="ri-youtube-line"></i> YouTube
              </div>
              <div class="option" data-value="twitch">
                <i class="ri-twitch-line"></i> Twitch
              </div>
            </div>
          </div>

          <div class="search-bar">
            <i class="ri-search-line"></i>
            <input type="text" placeholder="Search Movies..." />

            <div
              class="dropdown-wrapper filter-dropdown"
              id="filter-dropdown-wrapper"
              style="display: none"
              data-tooltip="Filter"
              data-tooltip-pos="bottom"
              data-tooltip-delay="0"
            >
              <i class="ri-filter-3-line filter-icon"></i>
              <div
                class="dropdown-options filter-dropdown-options"
                id="filter-options-container"
              ></div>
            </div>
          </div>
        </div>
      </div>

      <div class="grid-container source-movie" id="grid">
        <p class="no-results-message">No results found.</p>
      </div>
    </div>

    <div id="game-overlay">
      <div id="loading-container">
        <div class="lds-ripple">
          <div></div>
          <div></div>
        </div>
        <div id="loading-message">LOADING..</div>
      </div>

      <div id="game-wrapper">
        <div id="button-panel">
          <button class="icon-button" id="back-btn" title="Back">
            <i class="ri-arrow-left-line"></i>
          </button>
          <button
            class="icon-button"
            id="server-btn"
            title="Change Server"
            style="display: none"
          >
            <i class="ri-cloud-line"></i>
          </button>
          <button
            class="icon-button"
            id="cc-btn"
            title="Subtitles"
            style="display: none"
          >
            <i class="ri-closed-captioning-line"></i>
          </button>
          <div id="server-options-wrapper"></div>
          <div id="cc-options-wrapper"></div>
        </div>

        <div id="player-container"></div>
      </div>
    </div>

    <div id="tv-modal-container">
      <div id="tv-modal-content">
        <div class="tv-list-header" id="tv-modal-header">Loading...</div>
        <div id="tv-modal-list"></div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      apply_background_effect("body");
    </script>
  </body>
</html>
