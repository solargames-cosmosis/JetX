<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JetX Games</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b12;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px 10px;
}

/* LOGO */
.logo-btn {
  font-size: 100px;
  font-weight: bold;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 20px rgba(109,40,217,0.6);
  cursor: pointer;
  border: none;
  background-color: transparent;
}

/* SEARCH (optional but safe now) */
#searchBar {
  width: 80%;
  max-width: 500px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 10px auto;
  display: block;
  outline: none;
}

/* GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* GAME CARD */
.card {
  display: block;
  background: #141424;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  overflow: hidden;
  transition: 0.2s ease;
}

.card:hover {
  transform: scale(1.05);
}

.thumb {
  height: 110px;
  background: linear-gradient(135deg, #6d28d9, #1b1b2e);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.name {
  padding: 10px;
  font-size: 14px;
  text-align: center;
}
</style>
</head>

<body>

<div class="header">
  <button class="logo-btn" onclick="window.location.href='index.html'">
    JetX
  </button>
</div>

<input id="searchBar" placeholder="Search games..." />

<div id="grid"></div>

<script>
const games = [
"1v1.LOL","10 Minutes Til Dawn","2048","2D Rocket League","60 Second Burger Run",
"A Dance Of Fire And Ice","Achievement Unlocked","Achievement Unlocked 2",
"Adventure Capitalist","Adventure Drivers","Age Of War","Age Of War 2",
"Arcade Car Drift","Archery World Tour","Astro Survivors","A Small World Cup",
"Awesome Tanks 2","Backrooms","Bacon May Die","Bad Ice Cream","Bad Ice Cream 2",
"Bad Ice Cream 3","Bad Time Simulator","Baldis Basics","Basketball Stars",
"Basket Random","Bee Swarm Simulator","Big Tower Tiny Square","Bike Obby",
"BitLife","Bob The Robber 2","Bounce Masters","Bow Masters","Boxing Random",
"Block Blast","Blumgi Bounce","Blumgi Paintball","Blumgi Racers","Blumgi Slime",
"Brain Test","Cappybara Clicker","Cell Machine","Chess","Choppy Orc","CircloO",
"Clicker Heroes","Cluster Rush","Cookie Clicker","Core Ball","Crazy Bikes",
"Crazy Cars","Crossy Road","CSGO Clicker","Cube Field","Cut The Rope"
];

function slugify(text){
  return text.toLowerCase().replace(/[^a-z0-9]+/g, "");
}

function render(list){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  list.forEach(name => {
    const a = document.createElement("a");
    a.className = "card";
    a.href = "/g/" + slugify(name);

    a.innerHTML = `
      <div class="thumb">Play</div>
      <div class="name">${name}</div>
    `;

    grid.appendChild(a);
  });
}

/* SAFE SEARCH (won’t break page) */
const search = document.getElementById("searchBar");
search.addEventListener("input", (e) => {
  const val = e.target.value.toLowerCase();
  render(games.filter(g => g.toLowerCase().includes(val)));
});

render(games);
</script>

</body>
</html>
