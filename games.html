<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JetX Games</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial;
  color: white;
}

#header {
  text-align: center;
  font-size: 34px;
  padding: 20px;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

#grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  padding: 20px;
}

.game {
  height: 140px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #003366;
  cursor: pointer;
  position: relative;
  transition: 0.2s;
}

.game:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #003366;
}

.game img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.label {
  position: absolute;
  bottom: 0;
  width: 100%;
  text-align: center;
  background: rgba(0,0,0,0.6);
  padding: 5px;
}

#back {
  position: absolute;
  top: 15px;
  left: 15px;
  background: #001a33;
  border: 1px solid #003366;
  color: white;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<button id="back" onclick="window.location.href='index.html'">← Back</button>

<div id="header">JetX Games</div>

<div id="grid">

<div class="game" onclick="openGame('games/slope.html')">
  <img src="assets/games/slope.png">
  <div class="label">Slope</div>
</div>

<div class="game" onclick="openGame('games/retro-bowl.html')">
  <img src="assets/games/retro.png">
  <div class="label">Retro Bowl</div>
</div>

</div>

<script>
function openGame(url) {
  window.location.href = url;
}
</script>

</body>
</html>
