<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b12;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px 10px;
}

.logo-btn {
  font-size: 80px;
  font-weight: bold;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  cursor: pointer;
  border: none;
  background-color: transparent;
}

/* GRID */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD */
.card {
  background: #141424;
  border-radius: 12px;
  overflow: hidden;
  color: white;
  transition: 0.2s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  background: #222;
}

.name {
  padding: 8px;
  font-size: 14px;
  text-align: center;
}

/* GAME VIEW */
#gameView {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  flex-direction: column;
  z-index: 9999;
}

/* GAME HEADER */
.game-header {
  height: 50px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 15px;
}

.game-title {
  font-weight: bold;
}

.game-buttons button {
  margin-left: 10px;
  padding: 6px 10px;
  border: none;
  background: #6d28d9;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* IFRAME */
#gameFrame {
  flex: 1;
  width: 100%;
  border: none;
}
</style>
</head>

// IMAGE
function makeImage(name){
  const base = "https://pizzaedition.win/avifgames/";
  const img = document.createElement("img");

  const sources = [
    base + name + ".png",
    base + name + ".jpg",
    base + name + ".avif"
  ];

  let i = 0;
  img.src = sources[i];

  img.onerror = () => {
    i++;
    if(i < sources.length){
      img.src = sources[i];
    } else {
      img.src = "https://via.placeholder.com/300x200?text=No+Image";
    }
  };

  return img;
}


// 🔥 LOAD GAME INTO IFRAME
function openGame(file){
  const frame = document.getElementById("gameFrame");
  const view = document.getElementById("gameView");

  const url = `https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile/UGS-Files/${encodeURIComponent(file + ".html")}`;

  frame.src = url;
  view.style.display = "flex";
}


// 🔥 HOME BUTTON
function goHome(){
  document.getElementById("gameView").style.display = "none";
  document.getElementById("gameFrame").src = "";
}


// 🔥 FULLSCREEN BUTTON
function goFullscreen(){
  const frame = document.getElementById("gameFrame");
  if (frame.requestFullscreen) {
    frame.requestFullscreen();
  }
}


// 🔥 RENDER
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  files.forEach(file => {

    const clean = file
      .toLowerCase()
      .replace(/^cl/, "")
      .replace(/[^a-z0-9]/g,"");

    if (!allowedGames.includes(clean)) return;

    const card = document.createElement("div");
    card.className = "card";

    card.onclick = () => openGame(file);

    const img = makeImage(clean);

    const label = document.createElement("div");
    label.className = "name";
    label.textContent = clean;

    card.appendChild(img);
    card.appendChild(label);

    grid.appendChild(card);
  });
}
