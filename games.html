<!DOCTYPE html>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JetX Games</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b12;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px 10px;
}

/* LOGO */
.logo-btn {
  font-size: 80px;
  font-weight: bold;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 20px rgba(109,40,217,0.6);
  cursor: pointer;
  border: none;
  background-color: transparent;
}

/* GRID */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD */
.card {
  background: #141424;
  border-radius: 12px;
  overflow: hidden;
  color: white;
  transition: 0.2s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  background: #222;
}

.name {
  padding: 8px;
  font-size: 14px;
  text-align: center;
}

/* GAME OVERLAY */
#game-frame {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: black;
  z-index: 999;
}

#close-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  z-index: 1000;
  padding: 10px 15px;
  background: #6d28d9;
  color: white;
  border: none;
  border-radius: 8px;
  display: none;
  cursor: pointer;
}
</style>
</head>

function slugify(text){
  return text.toLowerCase().replace(/[^a-z0-9]+/g,"");
}

function makeImage(name){
  const base = "https://pizzaedition.win/avifgames/";
  const slug = slugify(name);

  const img = document.createElement("img");

  const sources = [
    base + slug + ".png",
    base + slug + ".jpg",
    base + slug + ".avif"
  ];

  let i = 0;
  img.src = sources[i];

  img.onerror = () => {
    i++;
    if(i < sources.length){
      img.src = sources[i];
    } else {
      img.src = "https://via.placeholder.com/300x200?text=No+Image";
    }
  };

  return img;
}

function launchGame(game){
  const iframe = document.getElementById("game-frame");
  const btn = document.getElementById("close-btn");

  const base = "https://ubgwtf.gitlab.io/";
  const primary = base + game + "/";
  const fallback = base + game.replace(/-/g,"") + "/";

  iframe.style.display = "block";
  btn.style.display = "block";

  iframe.src = primary;

  let tried = false;

  iframe.onload = () => {
    setTimeout(() => {
      try {
        if(!iframe.contentWindow.length && !tried){
          iframe.src = fallback;
          tried = true;
        }
      } catch(e){}
    },1500);
  };
}

function closeGame(){
  const iframe = document.getElementById("game-frame");
  const btn = document.getElementById("close-btn");

  iframe.src = "";
  iframe.style.display = "none";
  btn.style.display = "none";
}

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  games.forEach(name => {
    const card = document.createElement("div");
    card.className = "card";

    const slug = slugify(name);

    card.onclick = () => launchGame(slug);

    const img = makeImage(name);

    const label = document.createElement("div");
    label.className = "name";
    label.textContent = name;

    card.appendChild(img);
    card.appendChild(label);

    grid.appendChild(card);
  });
}

render();
