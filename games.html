<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Games</title>

<style>
body {
  background: #121826;
  color: white;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
}

#search {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

#games {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
}

.game {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
}

.game img {
  width: 100%;
  display: block;
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  text-align: center;
  padding: 6px;
  font-size: 14px;
}
</style>
</head>

<body>

<input id="search" placeholder="Search games...">
<div id="games"></div>

<script>
// convert names → urls + images
function slugify(name){
  return name
    .toLowerCase()
    .replace(/[^a-z0-9]/g, "");
}

function imgPath(name){
  return "/avifgames/" + slugify(name) + ".avif";
}

function urlPath(name){
  return "/g/" + slugify(name);
}

// build objects
const games = gameNames.map(name => ({
  title: name,
  url: urlPath(name),
  img: imgPath(name)
}));

const container = document.getElementById("games");
const search = document.getElementById("search");

function render(list){
  container.innerHTML = "";
  list.forEach(game => {
    const div = document.createElement("div");
    div.className = "game";

    div.innerHTML = `
      <a href="${game.url}">
        <img src="${game.img}" alt="${game.title}" loading="lazy">
        <div class="overlay">${game.title}</div>
      </a>
    `;

    container.appendChild(div);
  });
}

render(games);

// search
search.addEventListener("input", () => {
  const value = search.value.toLowerCase();
  render(games.filter(g => g.title.toLowerCase().includes(value)));
});
</script>
