<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121826;
      color: white;
    }

    .container {
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .game-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
    }

    .game-card:hover {
      transform: scale(1.05);
      background: #334155;
    }

    .game-card img {
      width: 100%;
      border-radius: 8px;
    }

    .game-title {
      margin-top: 8px;
      font-size: 14px;
    }

    #game-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      display: none;
      background: black;
      z-index: 999;
    }

    #close-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 1000;
      padding: 10px 15px;
      background: red;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Games</h1>

  <div class="games-grid">

    <!-- GAME CARD -->
    <div class="game-card" onclick="launchGame('basket-random')">
      <img src="https://ubgwtf.gitlab.io/file/basket-random.png">
      <div class="game-title">Basket Random</div>
    </div>

    <div class="game-card" onclick="launchGame('retro-bowl')">
      <img src="https://ubgwtf.gitlab.io/file/retro-bowl.png">
      <div class="game-title">Retro Bowl</div>
    </div>

    <div class="game-card" onclick="launchGame('run-3')">
      <img src="https://ubgwtf.gitlab.io/file/run-3.png">
      <div class="game-title">Run 3</div>
    </div>

    <div class="game-card" onclick="launchGame('slope')">
      <img src="https://ubgwtf.gitlab.io/file/slope.png">
      <div class="game-title">Slope</div>
    </div>

  </div>
</div>

<iframe id="game-frame"></iframe>
<button id="close-btn" onclick="closeGame()">Close</button>

<script>
  const baseURL = "https://ubgwtf.gitlab.io/";

  function launchGame(game) {
    const iframe = document.getElementById("game-frame");
    const closeBtn = document.getElementById("close-btn");

    let primaryURL = baseURL + game + "/";
    let fallbackURL = baseURL + game.replace(/-/g, "") + "/";

    iframe.style.display = "block";
    closeBtn.style.display = "block";

    iframe.src = primaryURL;

    iframe.onerror = () => {
      iframe.src = fallbackURL;
    };
  }

  function closeGame() {
    const iframe = document.getElementById("game-frame");
    const closeBtn = document.getElementById("close-btn");

    iframe.src = "";
    iframe.style.display = "none";
    closeBtn.style.display = "none";
  }
</script>

<script src="/js/global.js"></script>

</body>
</html>
