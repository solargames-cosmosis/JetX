<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JetX Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="jet.png">

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
      font-size: 40px;
      background: linear-gradient(90deg, white, #6d28d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* GRID */
    .games-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    /* CARD */
    .game {
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
    }

    .game:hover {
      transform: scale(1.05);
      border-color: #003366;
    }

    .game img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .game-title {
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }

    /* BACK BUTTON */
    #back {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <button id="back" onclick="goHome()">← Home</button>

  <h1>Games</h1>

  <div class="games-container">

    <!-- GAME 1 -->
    <div class="game" onclick="openGame('games/game1.html')">
      <img src="thumbnails/game1.png">
      <div class="game-title">Game 1</div>
    </div>

    <!-- GAME 2 -->
    <div class="game" onclick="openGame('games/game2.html')">
      <img src="thumbnails/game2.png">
      <div class="game-title">Game 2</div>
    </div>

    <!-- ADD MORE GAMES LIKE THIS -->

  </div>

  <script>
    function openGame(path) {
      window.location.href = path;
    }

    function goHome() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
