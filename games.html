<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JetX - Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* HEADER */
    #header {
      padding: 20px;
      text-align: center;
      font-size: 34px;
      font-weight: bold;
      background: linear-gradient(90deg, white, #6d28d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* GRID */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      padding: 20px;
    }

    /* GAME CARD */
    .game {
      position: relative;
      height: 140px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid #003366;
      transition: 0.2s ease;
      background: #0a0a0a;
    }

    .game img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      transition: 0.3s ease;
    }

    .game:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #003366;
      border-color: #6d28d9;
    }

    .game:hover img {
      opacity: 1;
      transform: scale(1.1);
    }

    .label {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 6px;
      text-align: center;
      font-size: 14px;
      background: rgba(0,0,0,0.6);
    }

    /* BACK BUTTON */
    #back {
      position: absolute;
      top: 15px;
      left: 15px;
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <button id="back" onclick="goBack()">← Back</button>

  <div id="header">JetX Games</div>

  <div id="grid">

    <!-- GAME 1 -->
    <div class="game" onclick="openGame('https://example.com')">
      <img src="https://via.placeholder.com/300x200.png?text=Game+1" alt="Game 1">
      <div class="label">Game 1</div>
    </div>

    <!-- GAME 2 -->
    <div class="game" onclick="openGame('https://example.com')">
      <img src="https://via.placeholder.com/300x200.png?text=Game+2" alt="Game 2">
      <div class="label">Game 2</div>
    </div>

    <!-- GAME 3 -->
    <div class="game" onclick="openGame('https://example.com')">
      <img src="https://via.placeholder.com/300x200.png?text=Game+3" alt="Game 3">
      <div class="label">Game 3</div>
    </div>

  </div>

  <script>
    function openGame(url) {
      window.open(url, "_blank");
    }

    function goBack() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
