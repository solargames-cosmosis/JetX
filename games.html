<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JetX Games</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b12;
  color: white;
}

.header {
  text-align: center;
  padding: 20px 10px;
}

.logo-btn {
  font-size: 80px;
  font-weight: bold;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  cursor: pointer;
  border: none;
  background-color: transparent;
}

.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #141424;
  border-radius: 12px;
  overflow: hidden;
  text-decoration: none;
  color: white;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  background: #222;
}

.name {
  padding: 8px;
  font-size: 14px;
  text-align: center;
}
</style>
</head>

<body>

<div class="header">
  <button class="logo-btn" onclick="location.href='index.html'">
    JetX
  </button>
</div>

<div class="games-grid" id="grid"></div>

<script src="/js/global.js"></script>
<script>

const games = [
"1v1.LOL","2048","Basket Random","Drift Hunters","Run 3","Slope","Retro Bowl","Monkey Mart","Moto X3M","Subway Surfers"
];

function slugify(text){
  return text.toLowerCase().replace(/[^a-z0-9]+/g,"");
}

function makeImage(name){
  const base = "https://pizzaedition.win/avifgames/";
  const slug = slugify(name);

  const img = document.createElement("img");

  const sources = [
    base + slug + ".png",
    base + slug + ".jpg",
    base + slug + ".avif"
  ];

  let i = 0;
  img.src = sources[i];

  img.onerror = () => {
    i++;
    if(i < sources.length){
      img.src = sources[i];
    } else {
      img.src = "https://via.placeholder.com/300x200?text=No+Image";
    }
  };

  return img;
}

function render(){
  const grid = document.getElementById("grid");

  games.forEach(name => {
    const a = document.createElement("a");
    a.className = "card";

    // ✅ ONLY passes game name
    a.href = "game.html?game=" + slugify(name);

    const img = makeImage(name);

    const label = document.createElement("div");
    label.className = "name";
    label.textContent = name;

    a.appendChild(img);
    a.appendChild(label);

    grid.appendChild(a);
  });
}

render();

</script>

</body>
</html>
