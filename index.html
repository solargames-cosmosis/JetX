<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JetX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="jet.png">

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* CLOCK */
    #clock {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
    }

    #time {
      font-size: 32px;
      font-weight: bold;
      background: linear-gradient(90deg, white, #6d28d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #date {
      font-size: 14px;
      color: #aaa;
    }

    /* TOP RIGHT */
    #top-right {
      position: absolute;
      top: 15px;
      right: 15px;
    }

    #top-right button {
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      padding: 8px 12px;
      margin-left: 6px;
      cursor: pointer;
      border-radius: 6px;
    }

    /* CENTER */
    .center {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo {
      font-size: 100px;
      font-weight: bold;
      background: linear-gradient(90deg, white, #6d28d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(109,40,217,0.6);
    }

    /* JET */
    #jet {
      width: 120px;
      animation: fly 2s ease-out forwards;
    }

    @keyframes fly {
      0% { transform: translateX(-200px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }

    /* VERSION */
    #version {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
    }

    #version button {
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* FLOAT MENU */
    #menu {
      position: absolute;
      bottom: 70px;
      left: 20px;
      background: rgba(10,10,10,0.95);
      border: 1px solid #222;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }

    #menu button {
      display: block;
      width: 160px;
      margin-bottom: 8px;
      padding: 10px;
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
    }

    #menu-btn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- CLOCK -->
  <div id="clock">
    <div id="time">--:--</div>
    <div id="date">Loading...</div>
  </div>

  <!-- TOP RIGHT -->
  <div id="top-right">
    <button onclick="alert('Settings coming soon')">⚙</button>
    <button onclick="alert('Login coming soon')">Login</button>
  </div>

  <!-- MENU -->
  <div id="menu">
    <button onclick="go('games.html')">Games</button>
    <button onclick="go('apps.html')">Apps</button>
    <button onclick="go('browser.html')">Browser</button>
    <button onclick="go('movies.html')">Movies</button>
    <button onclick="go('ai.html')">AI Chat</button>
    <button onclick="go('music.html')">Music</button>
  </div>

  <button id="menu-btn" onclick="toggleMenu()">☰</button>

  <!-- CENTER -->
  <div class="center">
    <div class="logo-container">
      <img id="jet" src="jet.png">
      <div class="logo">JetX</div>
    </div>
  </div>

  <!-- VERSION -->
  <div id="version">
    <button onclick="alert('JetX v1.0 - Initial Build')">v1.0</button>
  </div>

  <script>
    // CLOCK
    function updateClock() {
      const now = new Date();

      document.getElementById("time").textContent =
        now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

      document.getElementById("date").textContent =
        now.toDateString();
    }

    setInterval(updateClock, 1000);
    updateClock();

    // MENU
    function toggleMenu() {
      const menu = document.getElementById("menu");
      menu.style.display = menu.style.display === "block" ? "none" : "block";
    }

    // NAVIGATION
    function go(page) {
      window.location.href = page;
    }
  </script>

</body>
</html>
