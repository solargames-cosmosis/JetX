<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JetX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* CLOCK */
#clock {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
}

#time {
  font-size: 26px;
  font-weight: bold;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

#date {
  font-size: 14px;
  opacity: 0.7;
}

/* TOP RIGHT */
#top-right {
  position: absolute;
  top: 15px;
  right: 15px;
  display: flex;
  gap: 8px;
}

#top-right button {
  background: #001a33;
  border: 1px solid #003366;
  color: white;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
}

/* CENTER */
.center {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: row;
  gap: 15px;
}

.logo {
  font-size: 80px;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 15px;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* JET */
#jet {
  width: 90px;
  transform: translateX(-200px);
  animation: fly 1.8s ease-out forwards;
}

@keyframes fly {
  from { transform: translateX(-200px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* MENU */
#menu-btn {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: #001a33;
  border: 1px solid #003366;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

#menu {
  position: absolute;
  bottom: 80px;
  left: 20px;
  background: #0a0a0a;
  border: 1px solid #222;
  padding: 10px;
  border-radius: 10px;
  display: none;
  flex-direction: column;
  gap: 8px;
}

#menu button {
  background: #001a33;
  border: 1px solid #003366;
  color: white;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

/* VERSION */
#version {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
}

#version button {
  background: #001a33;
  border: 1px solid #003366;
  padding: 8px 14px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- CLOCK -->
<div id="clock">
  <div id="time">--:--</div>
  <div id="date">Loading...</div>
</div>

<!-- TOP RIGHT -->
<div id="top-right">
  <button onclick="alert('Settings soon')">⚙</button>
  <button onclick="alert('Login soon')">Login</button>
</div>

<!-- MENU -->
<div id="menu">
  <button onclick="go('index.html')">Home</button>
  <button onclick="go('games.html')">Games</button>
  <button onclick="alert('Apps soon')">Apps</button>
  <button onclick="alert('Browser soon')">Browser</button>
  <button onclick="alert('Movies soon')">Movies</button>
  <button onclick="alert('AI soon')">AI Chat</button>
  <button onclick="alert('Music soon')">Music</button>
</div>

<button id="menu-btn" onclick="toggleMenu()">☰</button>

<!-- CENTER -->
<div class="center">
  <div class="logo">
    <img id="jet" src="assets/jet.png">
    JetX
  </div>
</div>

<!-- VERSION -->
<div id="version">
  <button onclick="alert('JetX v1.0')">v1.0</button>
</div>

<script>
// CLOCK
function updateClock() {
  const now = new Date();
  document.getElementById("time").textContent =
    now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  document.getElementById("date").textContent = now.toDateString();
}
setInterval(updateClock, 1000);
updateClock();

// MENU
function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

// NAV
function go(page) {
  window.location.href = page;
}

// CLOSE MENU OUTSIDE CLICK
document.addEventListener("click", (e) => {
  const menu = document.getElementById("menu");
  const btn = document.getElementById("menu-btn");
  if (!menu.contains(e.target) && e.target !== btn) {
    menu.style.display = "none";
  }
});
</script>

</body>
</html>
