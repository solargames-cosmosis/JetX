<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JetX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- HOUSE FAVICON -->
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/25/25694.png">

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* CLOCK */
    #clock {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
    }

    #time {
      font-size: 26px;
      font-weight: bold;
      background: linear-gradient(90deg, white, #6d28d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #date {
      font-size: 14px;
      opacity: 0.7;
      color: #aaa;
    }

    /* TOP RIGHT */
    #top-right {
      position: absolute;
      top: 15px;
      right: 15px;
    }

    #top-right button {
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      padding: 8px 12px;
      margin-left: 6px;
      cursor: pointer;
      border-radius: 6px;
    }

    /* CENTER */
    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      font-size: 80px;
      font-weight: bold;
      background: linear-gradient(90deg, white, #6d28d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* VERSION */
    #version {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
    }

    #version button {
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
    }

    #version-panel {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: #0a0a0a;
      border: 1px solid #222;
      padding: 15px;
      display: none;
      border-radius: 10px;
    }

    /* MENU BUTTON */
    #menu-btn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    /* FLOATING MENU */
    #menu {
      position: fixed;
      bottom: 80px;
      left: 20px;
      width: 200px;
      background: #0a0a0a;
      border: 1px solid #222;
      padding: 12px;
      border-radius: 12px;
      display: none;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    #menu.show {
      display: block;
    }

    #menu button {
      display: block;
      width: 100%;
      margin-bottom: 8px;
      padding: 10px;
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    #close-menu {
      width: 100%;
      margin-bottom: 10px;
      background: darkred;
      border: none;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      color: white;
    }

    /* JET */
    #jet {
      position: absolute;
      left: -150px;
      top: 45%;
      width: 100px;
      animation: fly 2s ease-out forwards;
    }

    @keyframes fly {
      0% { left: -150px; opacity: 0; }
      100% { left: 40%; opacity: 1; }
    }
  </style>
</head>

<body>

  <!-- CLOCK -->
  <div id="clock">
    <div id="time">--:--</div>
    <div id="date">Loading date...</div>
  </div>

  <!-- TOP RIGHT -->
  <div id="top-right">
    <button onclick="alert('Settings coming soon')">⚙</button>
    <button onclick="alert('Login coming soon')">Login</button>
  </div>

  <!-- FLOATING MENU -->
  <div id="menu">
    <button id="close-menu" onclick="toggleMenu()">Close ✕</button>
    <button onclick="go('home.html')">Home</button>
    <button onclick="go('games.html')">Games</button>
    <button onclick="go('apps.html')">Apps</button>
    <button onclick="go('browser.html')">Browser</button>
    <button onclick="go('movies.html')">Movies</button>
    <button onclick="go('ai.html')">AI Chat</button>
    <button onclick="go('music.html')">Music</button>
  </div>

  <button id="menu-btn" onclick="toggleMenu()">☰</button>

  <!-- CENTER -->
  <div class="center">
    <img id="jet" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/F-16_Jet.png/320px-F-16_Jet.png">
    <div class="logo">JetX</div>
  </div>

  <!-- VERSION -->
  <div id="version">
    <button onclick="toggleVersion()">v1.0</button>
  </div>

  <div id="version-panel">
    <b>JetX v1.0</b>
    <p>Initial JetX build</p>
    <p>✔ Jet animation</p>
    <p>✔ Floating menu system</p>
  </div>

  <script>
    // CLOCK
    function updateClock() {
      const now = new Date();

      document.getElementById("time").textContent =
        now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

      document.getElementById("date").textContent =
        now.toDateString();
    }

    setInterval(updateClock, 1000);
    updateClock();

    // MENU
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("show");
    }

    // NAVIGATION
    function go(page) {
      window.location.href = page;
    }

    // VERSION
    function toggleVersion() {
      const panel = document.getElementById("version-panel");
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    }
  </script>

</body>
</html>
