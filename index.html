<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JetX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="jet.png">

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* CLOCK */
    #clock {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
    }

    #time {
      font-size: 26px;
      font-weight: bold;
      background: linear-gradient(90deg, white, #6d28d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #date {
      font-size: 14px;
      opacity: 0.7;
      color: #aaa;
    }

    /* TOP RIGHT */
    #top-right {
      position: absolute;
      top: 15px;
      right: 15px;
    }

    #top-right button {
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      padding: 8px 12px;
      margin-left: 6px;
      cursor: pointer;
      border-radius: 6px;
    }

    /* CENTER WRAPPER */
    .center {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .logo {
      font-size: 80px;
      font-weight: bold;
      background: linear-gradient(90deg, white, #6d28d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      z-index: 2;
    }

    /* JET (NOW ATTACHED TO LOGO AREA) */
    #jet {
      position: absolute;

      /* 👇 starts further left */
      left: calc(50% - 260px);
      top: 50%;
      transform: translateY(-50%);

      width: 140px;
      height: auto;

      animation: fly 2.2s ease-out forwards;
      filter: drop-shadow(0 0 10px rgba(0, 102, 255, 0.6));
      z-index: 1;
    }

    @keyframes fly {
      0% {
        left: -200px;
        opacity: 0;
        transform: translateY(-50%) rotate(-10deg) scale(0.9);
      }

      100% {
        left: calc(50% - 260px);
        opacity: 1;
        transform: translateY(-50%) rotate(0deg) scale(1);
      }
    }

    /* MENU */
    #menu-btn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    #menu {
      position: fixed;
      bottom: 80px;
      left: 20px;
      width: 200px;
      background: #0a0a0a;
      border: 1px solid #222;
      padding: 12px;
      border-radius: 12px;
      display: none;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    #menu.show {
      display: block;
    }

    #menu button {
      display: block;
      width: 100%;
      margin-bottom: 8px;
      padding: 10px;
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    /* VERSION */
    #version {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
    }

    #version button {
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
    }

    #version-panel {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: #0a0a0a;
      border: 1px solid #222;
      padding: 15px;
      display: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- CLOCK -->
  <div id="clock">
    <div id="time">--:--</div>
    <div id="date">Loading date...</div>
  </div>

  <!-- TOP RIGHT -->
  <div id="top-right">
    <button onclick="alert('Settings coming soon')">⚙</button>
    <button onclick="alert('Login coming soon')">Login</button>
  </div>

  <!-- CENTER -->
  <div class="center">
    <img id="jet" src="jet.png">
    <div class="logo">JetX</div>
  </div>

  <!-- MENU -->
  <button id="menu-btn" onclick="toggleMenu()">☰</button>

  <div id="menu">
    <button onclick="go('home.html')">Home</button>
    <button onclick="go('games.html')">Games</button>
    <button onclick="go('apps.html')">Apps</button>
    <button onclick="go('browser.html')">Browser</button>
    <button onclick="go('movies.html')">Movies</button>
    <button onclick="go('ai.html')">AI Chat</button>
    <button onclick="go('music.html')">Music</button>
  </div>

  <!-- VERSION -->
  <div id="version">
    <button onclick="toggleVersion()">v1.0</button>
  </div>

  <div id="version-panel">
    <b>JetX v1.0</b>
    <p>Jet aligned with logo</p>
    <p>UI improvements</p>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("show");
    }

    function go(page) {
      window.location.href = page;
    }

    function toggleVersion() {
      const panel = document.getElementById("version-panel");
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    }
  </script>

</body>
</html>
