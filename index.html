<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JetX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FAVICON -->
  <link rel="icon" href="jet.png">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- CLOCK -->
  <div id="clock">
    <div id="time">--:--</div>
    <div id="date">Loading...</div>
  </div>

  <!-- TOP RIGHT -->
  <div id="top-right">
    <button onclick="alert('Settings coming soon')">⚙</button>
    <button onclick="alert('Login coming soon')">Login</button>
  </div>

  <!-- MENU BUTTON -->
  <button id="menu-btn" onclick="toggleMenu()">☰</button>

  <!-- FLOATING MENU -->
  <div id="menu">
    <button onclick="goPage('home.html')">Home</button>
    <button onclick="goPage('games.html')">Games</button>
    <button onclick="goPage('apps.html')">Apps</button>
    <button onclick="goPage('browser.html')">Browser</button>
    <button onclick="goPage('movies.html')">Movies</button>
    <button onclick="goPage('ai.html')">AI Chat</button>
    <button onclick="goPage('music.html')">Music</button>
    <button onclick="toggleMenu()">Close ✕</button>
  </div>

  <!-- CENTER -->
  <div class="center">
    <!-- Jet (won’t break if image missing) -->
    <img id="jet" src="jet.png" onerror="this.style.display='none'">

    <div class="logo">JetX</div>
  </div>

  <!-- VERSION -->
  <div id="version">
    <button onclick="alert('JetX v1.0 - Initial Build')">
      v1.0
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
