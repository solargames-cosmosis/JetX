<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JetX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* CLOCK */
    #clock {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
    }

    #time {
      font-size: 26px;
      font-weight: bold;
      background: linear-gradient(90deg, white, #6d28d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #date {
      font-size: 14px;
      opacity: 0.7;
      color: #aaa;
    }

    /* TOP RIGHT */
    #top-right {
      position: absolute;
      top: 15px;
      right: 15px;
    }

    #top-right button {
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      padding: 8px 12px;
      margin-left: 6px;
      cursor: pointer;
      border-radius: 6px;
    }

    /* CENTER */
    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .logo {
      font-size: 80px;
      font-weight: bold;
      background: linear-gradient(90deg, white, #6d28d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* JET */
    #jet {
      position: absolute;
      left: -150px;
      top: 45%;
      width: 100px;
      animation: fly 2s ease-out forwards;
    }

    @keyframes fly {
      0% { left: -150px; opacity: 0; }
      100% { left: 40%; opacity: 1; }
    }

    /* VERSION */
    #version {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
    }

    #version button {
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* MENU BUTTON */
    #menu-btn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 10;
    }

    /* MENU (FLOATING) */
    #menu {
      position: absolute;
      left: 20px;
      bottom: 80px;
      background: #0a0a0a;
      border: 1px solid #222;
      padding: 12px;
      border-radius: 10px;
      display: none;
      flex-direction: column;
      z-index: 10;
    }

    #menu button {
      display: block;
      width: 160px;
      margin-bottom: 8px;
      padding: 10px;
      background: #001a33;
      border: 1px solid #003366;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    #menu.show {
      display: flex;
    }
  </style>
</head>

<body>

  <!-- CLOCK -->
  <div id="clock">
    <div id="time">--:--</div>
    <div id="date">Loading date...</div>
  </div>

  <!-- TOP RIGHT -->
  <div id="top-right">
    <button onclick="alert('Settings coming soon')">⚙</button>
    <button onclick="alert('Login coming soon')">Login</button>
  </div>

  <!-- MENU -->
  <div id="menu">
    <button onclick="go('home.html')">Home</button>
    <button onclick="go('games.html')">Games</button>
    <button onclick="go('apps.html')">Apps</button>
    <button onclick="go('browser.html')">Browser</button>
    <button onclick="go('movies.html')">Movies</button>
    <button onclick="go('ai.html')">AI Chat</button>
    <button onclick="go('music.html')">Music</button>
    <button onclick="toggleMenu()">Close ✕</button>
  </div>

  <!-- MENU BUTTON -->
  <button id="menu-btn" onclick="toggleMenu()">☰</button>

  <!-- CENTER -->
  <div class="center">
    <img id="jet" src="jet.png" onerror="this.style.display='none'">
    <div class="logo">JetX</div>
  </div>

  <!-- VERSION -->
  <div id="version">
    <button onclick="alert('JetX v1.0 - Initial Build')">
      v1.0
    </button>
  </div>

  <script>
    // CLOCK
    function updateClock() {
      const now = new Date();

      document.getElementById("time").textContent =
        now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

      document.getElementById("date").textContent =
        now.toDateString();
    }

    setInterval(updateClock, 1000);
    updateClock();

    // MENU TOGGLE (FIXED)
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("show");
    }

    // NAVIGATION (FIXED)
    function go(page) {
      window.location.href = "pages/" + page;
    }
  </script>

</body>
</html>
