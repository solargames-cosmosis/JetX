<!DOCTYPE html>
<html>
<head>
<title>JetX Games</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #2e3244 0%, #36224b 100%);
  margin: 0;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  width: 70px;
  height: 100vh;
  background: rgba(0,0,0,0.3);
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
}

.sidebar-btn {
  background: #5986da;
  border: none;
  padding: 10px;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

/* MAIN */
.main {
  margin-left: 80px;
  padding: 20px;
  width: 100%;
}

/* SECTIONS */
.letter-section {
  margin-bottom: 40px;
}

.letter-header {
  font-size: 28px;
  color: white;
  margin-bottom: 10px;
}

/* GRID */
.buttons-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: #141424;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 110px;
  object-fit: cover;
}

.name {
  text-align: center;
  padding: 8px;
  font-size: 13px;
  color: white;
}
</style>

</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="main">
  <h1 style="color:white;text-align:center;">JetX Games</h1>
  <div id="sections-container"></div>
</div>

<script>

// 🔥 PASTE YOUR FULL FILE LIST HERE
const files = [
];

const allChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789".split("");

// SORT FILES INTO A-Z
function generateAllSections(){

  const filesByChar = {};
  allChars.forEach(c => filesByChar[c] = []);

  files.forEach(file => {
    const lower = file.toLowerCase();
    if(lower.startsWith("cl")){
      const after = lower.substring(2);
      if(after.length > 0){
        const first = after[0].toUpperCase();
        if(filesByChar[first]){
          filesByChar[first].push(file);
        }
      }
    }
  });

  const container = document.getElementById("sections-container");

  allChars.forEach(char => {

    const section = document.createElement("div");
    section.className = "letter-section";
    section.id = "section-" + char;

    const header = document.createElement("div");
    header.className = "letter-header";
    header.textContent = char;

    const grid = document.createElement("div");
    grid.className = "buttons-container";

    if(filesByChar[char].length > 0){

      filesByChar[char].forEach(file => {

        const card = document.createElement("div");
        card.className = "card";

        const name = file.replace(/^cl/i,"");

        // IMAGE
        const img = document.createElement("img");
        const slug = name.toLowerCase().replace(/[^a-z0-9]/g,"");
        img.src = `https://pizzaedition.win/avifgames/${slug}.png`;

        img.onerror = () => {
          img.src = "https://via.placeholder.com/300x200?text=No+Image";
        };

        // LABEL
        const label = document.createElement("div");
        label.className = "name";
        label.textContent = name;

        // CLICK = UGS FETCH
        card.onclick = () => {
          const fileName = file.endsWith(".html") ? file : file + ".html";
          const encoded = encodeURIComponent(fileName);

          fetch(`https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile/UGS-Files/${encoded}?t=${Date.now()}`)
            .then(res => res.text())
            .then(html => {
              const win = window.open();
              win.document.open();
              win.document.write(html);
              win.document.close();
            });
        };

        card.appendChild(img);
        card.appendChild(label);
        grid.appendChild(card);

      });

    }

    section.appendChild(header);
    section.appendChild(grid);
    container.appendChild(section);
  });

  generateSidebar(filesByChar);
}

// SIDEBAR
function generateSidebar(filesByChar){
  const sidebar = document.getElementById("sidebar");

  allChars.forEach(char => {
    const btn = document.createElement("button");
    btn.className = "sidebar-btn";
    btn.textContent = char;

    if(filesByChar[char].length > 0){
      btn.onclick = () => {
        document.getElementById("section-" + char).scrollIntoView({
          behavior: "smooth"
        });
      };
    } else {
      btn.style.opacity = "0.3";
    }

    sidebar.appendChild(btn);
  });
}

generateAllSections();

</script>

</body>
</html>
