<Module>
<ModulePrefs title="Google.com" />
<Content type="html"><![CDATA[

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

  <style>
    body {
      margin: 0;
      background: #0b0b12;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    /* FULLSCREEN BUTTON (JetX Style) */
    .fullscreen-btn {
      margin: 12px;
      padding: 10px 22px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      background: linear-gradient(90deg, white, #6d28d9);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-shadow: 0 0 10px rgba(109,40,217,0.6);
      box-shadow: 0 0 15px rgba(109,40,217,0.6);
      transition: 0.2s ease;
    }

    .fullscreen-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(109,40,217,0.9);
    }

    .webgl-content {
      width: 100%;
      height: 90vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #gameContainer {
      width: 100%;
      height: 100%;
    }
  </style>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/n-101-1/1@main/style.css">
  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/UnityProgress.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/2.7.js"></script>

  <script>
    var gameInstance;

    window.onload = function () {
      gameInstance = UnityLoader.instantiate(
        "gameContainer",
        "https://cdn.jsdelivr.net/gh/n-101-1/1@main/2.7.json",
        {
          onProgress: UnityProgress,
          Module: {
            onRuntimeInitialized: function () {
              UnityProgress(gameInstance, "complete");
            }
          }
        }
      );
    };

    /* FULLSCREEN FUNCTION */
    function goFullscreen() {
      const game = document.getElementById("gameContainer");

      if (!document.fullscreenElement) {
        if (game.requestFullscreen) {
          game.requestFullscreen();
        } else if (game.webkitRequestFullscreen) {
          game.webkitRequestFullscreen();
        } else if (game.msRequestFullscreen) {
          game.msRequestFullscreen();
        }
      } else {
        document.exitFullscreen();
      }
    }
  </script>
</head>

<body>

  <!-- FULLSCREEN BUTTON -->
  <button class="fullscreen-btn" onclick="goFullscreen()">
    ⛶ Fullscreen
  </button>

  <div class="webgl-content">
    <div id="gameContainer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firebase-app.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firebase-auth.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firebase-firestore.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firebase.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/1login.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firestore.js"></script>

  <script>
    initializeFireBase();

    function showAds() {
      console.log("show ads");
    }

    function requestNewAd() {
      unityAdFinishedCallback();
    }

    function unityAdFinishedCallback() {
      try {
        if (gameInstance) {
          gameInstance.SendMessage("AdsManager", "OnWebCallback");
        }
      } catch (error) {
        console.log(error);
      }
    }
  </script>

</body>
</html>

]]></Content>
</Module>
