<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Rocket League 2D</title>

<link rel="stylesheet" href="css/main.css">

<style>
/* ===== JetX TOP BAR ===== */
.jetx-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 70px;
  background: rgba(10,10,20,0.85);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999999;
  border-bottom: 1px solid rgba(109,40,217,0.3);
}

/* JetX Logo Button */
.jetx-logo {
  font-size: 40px;
  font-weight: bold;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 20px rgba(109,40,217,0.6);
  cursor: pointer;
  border: none;
  background-color: transparent;
}

/* Exit button */
.exit-btn {
  position: absolute;
  left: 15px;
  background: #6d28d9;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
.exit-btn:hover {
  transform: scale(1.05);
}
</style>

</head>

<body style="margin:0; padding:0; overflow:hidden;">

<!-- ===== JetX HEADER ===== -->
<div class="jetx-bar">
  <button class="exit-btn" onclick="window.location.href='/index.html'">
    Exit
  </button>

  <button class="jetx-logo" onclick="window.location.href='/index.html'">
    JetX
  </button>
</div>

<!-- ===== GAME CONTENT ===== -->
<div style="padding-top:70px;">
  
  <audio src="assets/goal_impact.ogg" class="goal-impact"></audio>
  <audio src="assets/goal_horn.ogg" class="goal-horn"></audio>
  <audio src="assets/ball-hit.ogg" class="ball-hit"></audio>
  <audio src="assets/two-minute-warning.ogg" class="two-minute-warning"></audio>
  <audio src="assets/timer-running-out.ogg" class="timer-running-out"></audio>
  <audio src="assets/game-over.ogg" class="game-over"></audio>

  <div>
    <div class="center">
      <div class="scoreboard orange">0</div>
      <div class="spacer"></div>

      <div class="logo-timer">
        <img class="logo" src="assets/rocket-league-header.png">
        <img class="twod-logo" src="assets/2d_white1.png">
      </div>

      <div class="spacer"></div>
      <div class="scoreboard blue">0</div>
    </div>
  </div>

  <div class="start-button" style="background: green;">
    Start Match
  </div>

  <div class="instructions">
    <div class="controls">Controls</div>
    <div id="control-diagram">
      <div class="car-image"><img src="assets/Car_orange.png"></div>

      <div id="orange-controls">
        <p>W</p><p>S</p><p>A</p><p>D</p>
      </div>

      <div id="controls-text">
        <p>Accelerate</p>
        <p>Brake/Reverse</p>
        <p>Turn Left</p>
        <p>Turn Right</p>
      </div>

      <div id="blue-controls">
        <p>↑</p><p>↓</p><p>←</p><p>→</p>
      </div>

      <div class="car-image"><img src="assets/Car_blue.png"></div>
    </div>
  </div>

  <div class="game-over hidden">
    <div class="winner-announce"></div>
    <button class="play-again">Play Again?</button>
  </div>

  <script src="js/main.js"></script>
  <canvas width="1200" height="555"></canvas>
  <script src="js/collisions.js"></script>
  <script src="js/car_wall_collision.js"></script>

</div>

<!-- 🔥 GLOBAL SCRIPT (your requirement) -->
<script src="/js/global.js"></script>

</body>
</html>
