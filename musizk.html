<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>JetX Music</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
:root {
  --accent: #ff2a2a;
  --bg: #000;
  --panel: #0a0a0a;
  --panel2: #050505;
  --text: #ffffff;
  --subtext: #aaaaaa;
}

/* RESET */
* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: sans-serif;
  overflow: hidden;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 50px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  z-index: 999;
}

.logo {
  color: var(--accent);
  font-weight: bold;
}

.header-icons i {
  font-size: 22px;
  margin-left: 12px;
  cursor: pointer;
}

/* LAYOUT */
.wrapper {
  position: absolute;
  top: 50px;
  bottom: 0;
  width: 100%;
  display: flex;
}

/* LEFT PLAYER */
.left {
  width: 40%;
  min-width: 300px;
  background: var(--panel2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
  padding: 20px;
}

#coverArt {
  width: 220px;
  height: 220px;
  border-radius: 15px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 50px;
}

#songTitle {
  font-size: 18px;
  font-weight: 600;
}

#songArtist {
  color: var(--subtext);
}

/* PROGRESS */
#progressBar {
  width: 80%;
}

/* CONTROLS */
.controls {
  display: flex;
  align-items: center;
  gap: 20px;
}

.controls i {
  font-size: 28px;
  cursor: pointer;
}

#playPauseButton {
  background: none;
  border: none;
}

#playPauseButton i {
  font-size: 42px;
  color: var(--accent);
}

/* RIGHT SIDE */
#rightBox {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--panel);
}

/* SEARCH */
.top-bar {
  display: flex;
  padding: 10px;
  gap: 10px;
}

#searchInput {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
  outline: none;
}

#serviceButtonIcon {
  font-size: 22px;
  cursor: pointer;
}

/* RESULTS */
#searchResults {
  flex: 1;
  overflow-y: auto;
}

/* ITEMS */
.result-item {
  display: flex;
  gap: 10px;
  padding: 10px;
  cursor: pointer;
  border-radius: 8px;
}

.result-item:hover {
  background: rgba(255,255,255,0.05);
}

.result-art {
  width: 50px;
  height: 50px;
  background: #222;
  border-radius: 8px;
}

.result-text { flex: 1; }

.result-title { color: var(--text); }
.result-artist { color: var(--subtext); }

/* FORCE TEXT FIX */
span, div, p, input {
  color: var(--text);
}

/* DROPDOWN */
#dropdownOverlay {
  position: fixed;
  inset: 0;
  display: none;
}

#dropdownOverlay.visible { display: block; }

#serviceDropdown {
  position: fixed;
  background: #111;
  border-radius: 10px;
  padding: 10px;
  display: none;
}

#serviceDropdown.visible { display: block; }

.dropdown-option {
  padding: 8px;
  cursor: pointer;
}

.dropdown-option:hover {
  background: #222;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">JetX</div>
  <div class="header-icons">
    <i class="ri-home-line"></i>
    <i class="ri-fullscreen-line" onclick="document.documentElement.requestFullscreen()"></i>
  </div>
</div>

<div class="wrapper">

  <!-- LEFT -->
  <div class="left">
    <div id="coverArt">
      <i id="musicIcon" class="ri-music-2-fill"></i>
    </div>

    <div id="songTitle">Not Playing</div>
    <div id="songArtist">Search for a track</div>

    <input type="range" id="progressBar" value="0" max="100">

    <div class="controls">
      <i id="prevButton" class="ri-skip-back-fill"></i>
      <button id="playPauseButton"><i class="ri-play-circle-fill"></i></button>
      <i id="nextButton" class="ri-skip-forward-fill"></i>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="rightBox">

    <div class="top-bar">
      <input id="searchInput" placeholder="Search music..." />
      <i id="serviceButtonIcon" class="ri-hd-line"></i>
    </div>

    <div id="searchResults"></div>
    <div id="loadingMore"></div>

  </div>

</div>

<!-- DROPDOWN -->
<div id="dropdownOverlay"></div>

<div id="serviceDropdown">
  <div class="dropdown-option" data-service="tidal">Tidal</div>
  <div class="dropdown-option" data-service="soundcloud">SoundCloud</div>
</div>

<!-- YOUR JS -->
<script src="./js/theme.js"></script>
<script src="./js/tooltip.js"></script>
<script src="./js/background.js"></script>
<script src="script.js"></script>

<script>
if (typeof apply_background_effect === "function") {
  apply_background_effect("html");
}
</script>

</body>
</html>
