<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JetX Apps</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
  color: white;
}

/* ===== HEADER (JetX STANDARD) ===== */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 15px;
  z-index: 1000;
}

.logo {
  font-size: 36px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.controls button {
  margin-left: 10px;
  padding: 6px 10px;
  border: none;
  background: #6d28d9;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* ===== GRID ===== */
.main {
  margin-top: 90px;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 15px;
}

/* ===== APP CARDS ===== */
.card {
  background: #141424;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
  user-select: none;
}

.card:hover {
  transform: scale(1.05);
  background: #1d1d35;
}

.title {
  font-size: 14px;
  font-weight: 600;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo" onclick="goHome()">JetX</div>

  <div class="controls">
    <button onclick="goHome()">Home</button>
  </div>
</div>

<!-- APPS -->
<div class="main">
  <div class="grid">

    <div class="card" onclick="openApp('app/calculator.html')">
      <div class="title">Calculator</div>
    </div>

    <div class="card" onclick="openApp('app/ai.html')">
      <div class="title">AI</div>
    </div>

    <div class="card" onclick="openApp('app/notepad.html')">
      <div class="title">Notes</div>
    </div>

    <div class="card">
      <div class="title">Randomizer</div>
    </div>

    <div class="card">
      <div class="title">Chat</div>
    </div>

    <div class="card">
      <div class="title">Vault</div>
    </div>

    <div class="card">
      <div class="title">Flash Emulator</div>
    </div>

    <div class="card">
      <div class="title">Coming Soon</div>
    </div>

  </div>
</div>

<script>

/* OPEN APP */
function openApp(path){
  window.location.href = path;
}

/* HOME */
function goHome(){
  window.location.href = "https://jet-x-silk.vercel.app";
}

</script>

</body>
</html>
