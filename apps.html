<!DOCTYPE html>
<html>
<head>
<title>JetX: Apps</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #000000; /* 🔥 PURE BLACK */
  margin: 0;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 1000;
}

.logo {
  font-size: 42px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.controls button {
  margin-left: 10px;
  padding: 6px 12px;
  border: none;
  background: #6d28d9;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* MAIN */
.main {
  margin-top: 80px;
  padding: 20px;
}

/* GRID */
.apps-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
}

/* CARD */
.app-card {
  background: #141424;
  border-radius: 12px;
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  cursor: pointer;
  transition: 0.2s;
}

.app-card:hover {
  transform: scale(1.05);
}

.app-name {
  color: white;
  font-size: 14px;
  text-align: center;
}

/* PLAYER */
#app-player {
  position: fixed;
  top: 60px;
  left: 0;
  width: 100%;
  height: calc(100% - 60px);
  background: black;
  display: none;
  z-index: 999;
}

#app-frame {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo" onclick="goHome()">JetX</div>
  <div class="controls">
    <button onclick="goHome()">Home</button>
  </div>
</div>

<div class="main">
  <div class="apps-grid" id="appsGrid"></div>
</div>

<div id="app-player">
  <iframe id="app-frame"></iframe>
</div>

<script>

/* NAV */
function goHome(){
  window.location.href = "index.html";
}

function openApp(html){
  document.getElementById("app-player").style.display = "block";
  document.getElementById("app-frame").srcdoc = html;
}

/* APPS LIST (10 total) */
const apps = [
  "Calculator",
  "AI",
  "Notes",
  "Music",
  "Randomizer",
  "Browser",
  "Vault",
  "Chat",
  "Settings",
  "Coming Soon"
];

/* BUILD CARDS */
const grid = document.getElementById("appsGrid");

apps.forEach(name => {

  const card = document.createElement("div");
  card.className = "app-card";

  const label = document.createElement("div");
  label.className = "app-name";
  label.textContent = name;

  card.appendChild(label);

  /* CLICK ACTIONS */
  card.onclick = () => {

    if(name === "Calculator"){
      openApp(`
        <html>
        <body style="margin:0;background:black;color:white;display:flex;align-items:center;justify-content:center;height:100vh;">
          <h1>Calculator App (Coming Soon)</h1>
        </body>
        </html>
      `);
    }

    else if(name === "AI"){
      openApp(`
        <html>
        <body style="margin:0;background:black;color:white;display:flex;align-items:center;justify-content:center;height:100vh;">
          <h1>AI App (Coming Soon)</h1>
        </body>
        </html>
      `);
    }

    else {
      openApp(`
        <html>
        <body style="margin:0;background:black;color:white;display:flex;align-items:center;justify-content:center;height:100vh;">
          <h1>${name} (Coming Soon)</h1>
        </body>
        </html>
      `);
    }

  };

  grid.appendChild(card);

});

</script>

</body>
</html>
