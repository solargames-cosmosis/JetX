<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JetX: Audios</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 15px;
  z-index: 1000;
}

.logo {
  font-size: 34px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.controls button {
  margin-left: 10px;
  padding: 6px 10px;
  border: none;
  background: #6d28d9;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* IFRAME */
.fullscreen-iframe {
  position: fixed;
  top: 60px;
  left: 0;
  width: 100%;
  height: calc(100% - 60px);
  border: none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo" onclick="goHome()">JetX</div>

  <div class="controls">
    <button onclick="goFullscreen()">Fullscreen</button>
    <button onclick="goHome()">Home</button>
  </div>
</div>

<!-- IFRAME -->
<iframe 
  id="frame"
  src="https://dfs3rzq44v6as.cloudfront.net/zz/service/hvtrs8%2F-smuldalmuf.aoo%2F"
  class="fullscreen-iframe">
</iframe>

<script>
function goHome(){
  window.location.href = "/index.html";
}

function goFullscreen(){
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
}
</script>

</body>
</html>
