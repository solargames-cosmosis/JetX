<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JetX Library</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
}

/* HEADER (JetX) */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: #111;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  z-index: 1000;
}

.logo {
  color: white;
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;
}

.controls button {
  margin-left: 10px;
  padding: 6px 10px;
  border: none;
  background: #6d28d9;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* MAIN */
.main {
  margin-top: 70px;
  padding: 20px;
}

/* SEARCH */
.search {
  display: flex;
  gap: 10px;
  max-width: 900px;
  margin: auto;
}

.search input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.search select {
  padding: 10px;
  border-radius: 8px;
}

/* GRID */
#container {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}

.card {
  background: #141424;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  text-align: center;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.card p {
  color: white;
  font-size: 12px;
  padding: 6px;
}

/* PLAYER */
#player {
  position: fixed;
  top: 60px;
  left: 0;
  width: 100%;
  height: calc(100% - 60px);
  background: black;
  display: none;
  z-index: 999;
}

#frame {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo" onclick="home()">JetX</div>
  <div class="controls">
    <button onclick="fullscreen()">Fullscreen</button>
    <button onclick="closeGame()">Home</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="search">
    <input id="search" placeholder="Search games..." oninput="render()">
    <select>
      <option>Name</option>
    </select>
  </div>

  <div id="container"></div>
</div>

<!-- PLAYER -->
<div id="player">
  <iframe id="frame"></iframe>
</div>

<script>

/* =========================
   ZAAPIZ IMAGE SYSTEM
========================= */

const coverURL = "https://pizzaedition.win/avifgames";

const PLACEHOLDER =
'data:image/svg+xml;utf8,' + encodeURIComponent(`
<svg xmlns="http://www.w3.org/2000/svg" width="480" height="720">
<rect width="100%" height="100%" fill="#071029"/>
<text x="50%" y="50%" fill="#94a3b8" font-size="20"
text-anchor="middle" dominant-baseline="middle">
No cover
</text>
</svg>`);

function slugify(text){
  return text.toLowerCase().replace(/[^a-z0-9]/g,"");
}

function getCover(name){
  const slug = slugify(name);

  const sources = [
    `${coverURL}/${slug}.png`,
    `${coverURL}/${slug}.jpg`,
    `${coverURL}/${slug}.avif`
  ];

  return sources;
}

/* =========================
   GAMES
========================= */

let games = [
  "1v1.LOL",
  "2048",
  "Bad Ice Cream",
  "Basketball Stars",
  "Cookie Clicker",
  "Drift Hunters",
  "Geometry Dash",
  "Slope",
  "Subway Surfers"
];

/* =========================
   RENDER
========================= */

const container = document.getElementById("container");

function render(){

  const q = document.getElementById("search").value.toLowerCase();

  container.innerHTML = "";

  games
    .filter(g => g.toLowerCase().includes(q))
    .forEach(name => {

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");

      const sources = getCover(name);
      let i = 0;
      img.src = sources[i];

      img.onerror = () => {
        i++;
        if(i < sources.length){
          img.src = sources[i];
        } else {
          img.src = PLACEHOLDER;
        }
      };

      const label = document.createElement("p");
      label.textContent = name;

      card.onclick = () => openGame(name);

      card.appendChild(img);
      card.appendChild(label);

      container.appendChild(card);
    });
}

/* =========================
   PLAYER
========================= */

const player = document.getElementById("player");
const frame = document.getElementById("frame");

function openGame(name){
  player.style.display = "block";

  frame.srcdoc = `
  <html><body style="margin:0;background:black;color:white;
  display:flex;align-items:center;justify-content:center;">
  <h1>${name}</h1>
  </body></html>`;
}

function closeGame(){
  player.style.display = "none";
  frame.srcdoc = "";
}

function fullscreen(){
  player.requestFullscreen();
}

function home(){
  window.location.href = "/index.html";
}

render();

</script>

</body>
</html>
