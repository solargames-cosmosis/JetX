<!DOCTYPE html>
<html>
<head>
<title>JetX: Library</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #000000;
  margin: 0;
  display: flex;
  color: white;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  width: 70px;
  height: 100vh;
  background: rgba(0,0,0,0.3);
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  left: 70px;
  right: 0;
  height: 60px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 1000;
}

.logo {
  font-size: 48px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(90deg, white, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.controls button {
  margin-left: 10px;
  padding: 6px 10px;
  border: none;
  background: #6d28d9;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* MAIN */
.main {
  margin-left: 80px;
  margin-top: 70px;
  padding: 20px;
  max-width: 1200px;
}

/* GRID */
.buttons-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 12px;
}

/* CARD (JetX style game tile) */
.card {
  background: #141424;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
  aspect-ratio: 1 / 1;
  display: flex;
  flex-direction: column;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 70%;
  object-fit: cover;
}

.name {
  text-align: center;
  padding: 6px;
  font-size: 11px;
  color: #fff;
  font-weight: 600;
}

/* PLAYER */
#player {
  position: fixed;
  top: 60px;
  left: 70px;
  width: calc(100% - 70px);
  height: calc(100% - 60px);
  background: black;
  display: none;
  z-index: 999;
}

#player iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="sidebar"></div>

<div class="header">
  <div class="logo" onclick="goHome()">JetX</div>
  <div class="controls">
    <button onclick="goFullscreen()">Fullscreen</button>
    <button onclick="closeGame()">Home</button>
  </div>
</div>

<div class="main">
  <div id="sections-container" class="buttons-container"></div>
</div>

<div id="player">
  <iframe id="gameFrame"></iframe>
</div>

<script>
const container = document.getElementById("sections-container");
const player = document.getElementById("player");
const gameFrame = document.getElementById("gameFrame");

let zones = [];
let favorites = JSON.parse(localStorage.getItem("gn-favs") || "[]");

const zonesurls = ["./zones.json"];
let zonesURL = zonesurls[0];

const coverURL = "https://cdn.jsdelivr.net/gh/freebuisness/covers@main";

const PLACEHOLDER =
"data:image/svg+xml;utf8," +
encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><rect width="100%" height="100%" fill="black"/><text x="50%" y="50%" fill="white" text-anchor="middle">No Image</text></svg>'
);

function computeCover(file){
  if(!file) return PLACEHOLDER;
  if(file.cover) return file.cover.startsWith("http") ? file.cover : coverURL + "/" + file.cover;
  return coverURL + "/" + file.id + ".png";
}

async function listZones(){
  try{
    const res = await fetch(zonesURL);
    zones = await res.json();
    renderGrid(zones);
  } catch(e){
    container.innerHTML = "Error loading games";
  }
}

function renderGrid(data){
  container.innerHTML = "";

  data.forEach(file => {
    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = computeCover(file);
    img.onerror = () => img.src = PLACEHOLDER;

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = file.name;

    card.onclick = () => openGame(file);

    card.appendChild(img);
    card.appendChild(name);

    container.appendChild(card);
  });
}

/* GAME PLAYER (replaces Zaapiz zone viewer) */
function openGame(file){
  if(!file.url){
    alert("No game URL");
    return;
  }

  fetch(file.url)
    .then(res => res.text())
    .then(html => {
      gameFrame.srcdoc = html;
      player.style.display = "block";
    })
    .catch(err => alert("Failed to load game"));
}

function closeGame(){
  player.style.display = "none";
  gameFrame.srcdoc = "";
}

function goFullscreen(){
  if(gameFrame.requestFullscreen){
    gameFrame.requestFullscreen();
  }
}

function goHome(){
  closeGame();
}

listZones();
</script>

</body>
</html>
