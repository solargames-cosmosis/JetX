<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JetX Game</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f1220;
      font-family: Arial, sans-serif;
    }

    /* JetX Logo */
    .logo {
      position: fixed;
      top: 10px;
      left: 15px;
      z-index: 9999;
      font-size: 42px;
      font-weight: bold;
      background: linear-gradient(90deg, white, #6d28d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(109,40,217,0.6);
      cursor: pointer;
      user-select: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: black;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      opacity: 0.7;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <!-- JetX Home -->
  <div class="logo" onclick="window.location.href='games.html'">
    JetX
  </div>

  <div class="loading" id="loading">Loading game...</div>

  <iframe id="gameFrame"></iframe>

  <script src="/js/global.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const game = params.get("game");

    const frame = document.getElementById("gameFrame");
    const loading = document.getElementById("loading");

    if (game) {

      const base = "https://ubgwtf.gitlab.io/";

      const clean = game.toLowerCase().replace(/[^a-z0-9]/g, "");

      const attempts = [
        game.toLowerCase(),
        clean,
        game.toLowerCase().replace(/\\s+/g, "-"),
        game.toLowerCase().replace(/-/g, ""),
        game.toLowerCase().replace(/\\s+/g, ""),
        game.toLowerCase().replace(/([a-z])([0-9])/g, "$1-$2"),
        game.toLowerCase().replace(/([a-z])([A-Z])/g, "$1-$2").toLowerCase()
      ];

      let i = 0;

      function tryNext() {
        if (i >= attempts.length) {
          loading.innerText = "Game not found.";
          return;
        }

        const url = base + attempts[i];
        frame.src = url;

        let loaded = false;

        frame.onload = () => {
          loaded = true;
          loading.style.display = "none";
        };

        setTimeout(() => {
          if (!loaded) {
            i++;
            tryNext();
          }
        }, 2500);
      }

      tryNext();

    } else {
      loading.innerText = "No game selected.";
    }
  </script>

</body>
</html>
