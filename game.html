<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JetX Game</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f1220;
      font-family: Arial, sans-serif;
    }

    /* JetX Logo (home button) */
    .logo {
      position: fixed;
      top: 10px;
      left: 15px;
      z-index: 9999;
      font-size: 42px;
      font-weight: bold;
      background: linear-gradient(90deg, white, #6d28d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(109,40,217,0.6);
      cursor: pointer;
      user-select: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: black;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      opacity: 0.7;
      font-size: 18px;
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- JetX Home Button -->
  <div class="logo" onclick="window.location.href='games.html'">
    JetX
  </div>

  <div class="loading" id="loading">Loading game...</div>

  <iframe id="gameFrame"></iframe>

  <!-- your global script -->
  <script src="/js/global.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const game = params.get("game");

    const frame = document.getElementById("gameFrame");
    const loading = document.getElementById("loading");

    if (game) {
      // FINAL RULE YOU ASKED FOR:
      const url = `https://ubgwtf.gitlab.io/gameherehehehe/${game}`;

      frame.src = url;

      frame.onload = () => {
        loading.style.display = "none";
      };

      frame.onerror = () => {
        loading.innerText = "Game failed to load.";
      };

    } else {
      loading.innerText = "No game selected.";
    }
  </script>

</body>
</html>
